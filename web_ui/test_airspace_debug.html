<!DOCTYPE html>
<html>
<head>
    <title>Airspace Debug Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .result { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .found { background-color: #d4edda; }
        .notfound { background-color: #f8d7da; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Airspace Debug Test</h1>
    <p>Upload an AIXM XML file to debug airspace extraction</p>
    <input type="file" id="fileInput" accept=".xml">
    <div id="results"></div>

    <script src="js/aixm-parser.js"></script>
    <script>
        const parser = new AIXMParser();
        
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const text = await file.text();
            parser.parseXML(text);
            
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<h2>Results</h2>';
            
            // Check airspace borders
            const borderKeys = Object.keys(parser.airspaceBorders);
            resultsDiv.innerHTML += `<p>Total airspace borders extracted: ${borderKeys.length}</p>`;
            
            // Look for specific airspaces
            const testKeys = ['LFQQ|TMA', 'LFQQ13|TMA', 'DTKA|CTA'];
            testKeys.forEach(key => {
                const border = parser.airspaceBorders[key];
                const div = document.createElement('div');
                div.className = 'result ' + (border ? 'found' : 'notfound');
                div.innerHTML = `<strong>${key}</strong>: ${border ? border.length + ' vertices' : 'NOT FOUND'}`;
                if (border && border.length > 0) {
                    div.innerHTML += '<br>First 3 points:<pre>' + JSON.stringify(border.slice(0, 3), null, 2) + '</pre>';
                }
                resultsDiv.appendChild(div);
            });
            
            // Check extracted features
            const airspaces = parser.features.filter(f => f.type === 'airspace');
            resultsDiv.innerHTML += `<p>Total airspaces extracted: ${airspaces.length}</p>`;
            
            // Find specific airspaces
            testKeys.forEach(key => {
                const [codeId, codeType] = key.split('|');
                const airspace = airspaces.find(a => a.codeId === codeId && a.codeType === codeType);
                const div = document.createElement('div');
                div.className = 'result ' + (airspace && airspace.polygon ? 'found' : 'notfound');
                div.innerHTML = `<strong>Ase ${key}</strong>: ${airspace ? (airspace.polygon ? 'Has polygon (' + airspace.polygon.length + ' vertices)' : 'No polygon') : 'NOT FOUND'}`;
                if (airspace && airspace.polygon) {
                    div.innerHTML += '<br>First 3 points:<pre>' + JSON.stringify(airspace.polygon.slice(0, 3), null, 2) + '</pre>';
                }
                resultsDiv.appendChild(div);
            });
        });
    </script>
</body>
</html>
